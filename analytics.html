<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Analytics — FormDrop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#f7f5f0;--surface:#fff;--surface2:#f0ede6;
  --border:#e2ddd4;--border2:#ccc7bc;
  --text:#1a1916;--text2:#6b6760;--text3:#a8a49e;
  --accent:#2a5c45;--accent-light:#e8f2ed;--accent-text:#1d3f2f;
  --danger:#c0392b;--radius-lg:14px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
  --header-h:58px;
}

/* ── RESET ───────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100%;font-size:15px;-webkit-text-size-adjust:100%;overscroll-behavior-y:contain}
button,select,input,textarea{-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-family:inherit}

/* ── HEADER ──────────────────────────────────────────────── */
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 2rem;height:var(--header-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.logo{font-size:17px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
.header-right{display:flex;align-items:center;gap:10px}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{
  font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;
  padding:7px 16px;border-radius:8px;border:1px solid var(--border2);
  background:var(--surface);color:var(--text);cursor:pointer;
  transition:background .15s,transform .1s;
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#1d3f2f}

/* ── LAYOUT ──────────────────────────────────────────────── */
.main{max-width:960px;margin:0 auto;padding:2rem 1.5rem 5rem}
.page-title{font-size:24px;font-weight:600;letter-spacing:-.4px;margin-bottom:4px}
.page-sub{font-size:14px;color:var(--text2);margin-bottom:2rem;line-height:1.5}

/* ── CONFIG CARD ─────────────────────────────────────────── */
.config-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1.5rem}
.config-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.config-field{flex:1;min-width:220px}
.config-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase;display:block}
.config-input{font-family:'DM Mono',monospace;font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none;width:100%;transition:border-color .15s}
.config-input:focus{border-color:var(--accent)}
.config-status{font-size:12.5px;margin-top:8px;color:var(--text3);line-height:1.5}
.config-status.ok{color:var(--accent)}
.config-status.err{color:var(--danger)}

/* ── STATS ───────────────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:26px;font-weight:600;letter-spacing:-.5px;color:var(--text)}
.stat-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* ── TIMELINE ────────────────────────────────────────────── */
.timeline-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:2rem}
.section-title{font-size:15px;font-weight:600;margin-bottom:1rem}
.timeline-wrap{position:relative;height:120px}
.timeline-wrap canvas{display:block}

/* ── QUESTION CHARTS ─────────────────────────────────────── */
.questions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;margin-bottom:2rem}
.q-analytics-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;overflow:hidden}
.qa-title{font-size:14.5px;font-weight:500;margin-bottom:4px;line-height:1.4}
.qa-meta{font-size:12px;color:var(--text3);margin-bottom:1.25rem}
.chart-wrap{display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.legend{flex:1;min-width:140px;display:flex;flex-direction:column;gap:7px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.legend-label{flex:1;color:var(--text);line-height:1.3}
.legend-pct{font-weight:600;font-size:13px;font-family:'DM Mono',monospace}
.text-answers{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
.text-answer{font-size:13.5px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text2);line-height:1.4}
.no-answers{font-size:13px;color:var(--text3);font-style:italic}

/* ── TABLE ───────────────────────────────────────────────── */
.table-section{margin-top:2rem}
.resp-table-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);-webkit-overflow-scrolling:touch}
.resp-table{width:100%;border-collapse:collapse;font-size:13px}
.resp-table th{text-align:left;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-weight:500;color:var(--text2);white-space:nowrap;position:sticky;top:0}
.resp-table td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.resp-table tr:last-child td{border-bottom:none}
.resp-table tr:hover td{background:var(--surface2)}
.badge{display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:30px;background:var(--accent-light);color:var(--accent);min-width:28px}
.export-row{display:flex;gap:10px;margin-top:1rem;flex-wrap:wrap}

/* ── ADVANCED ANALYSIS ──────────────────────────────────────── */
.adv-tabs{display:flex;gap:8px;margin:10px 0 16px;flex-wrap:wrap}
.adv-tab-btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:background .15s}
.adv-tab-btn:hover{background:var(--surface2)}
.adv-tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.adv-panel{display:none}
.adv-panel.active{display:block}
.adv-select{font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none;min-width:180px}
.adv-select:focus{border-color:var(--accent)}
.adv-controls{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.adv-table{width:100%;border-collapse:collapse;font-size:13px}
.adv-table th,.adv-table td{padding:8px 10px;border:1px solid var(--border);text-align:center}
.adv-table th{background:var(--surface2);font-weight:600;color:var(--text2)}
.adv-table td:first-child,.adv-table th:first-child{text-align:left;font-weight:500}
.adv-empty{color:var(--text3);font-size:13px;padding:2rem 1rem;text-align:center}
.adv-hint{font-size:12.5px;color:var(--text2);margin-bottom:14px;line-height:1.6}

/* ── STATES ──────────────────────────────────────────────── */
.empty-state{text-align:center;padding:4rem 1.5rem;color:var(--text2)}
.empty-state h2{font-size:20px;font-weight:600;margin-bottom:8px;color:var(--text)}
.empty-state p{font-size:14px;line-height:1.6}
.loading-msg{text-align:center;padding:3rem;color:var(--text3);font-size:14px}

/* ════════════════════════════════════════════════════════════
   MOBILE
   ════════════════════════════════════════════════════════════ */
@media(max-width:768px){

  /* Header */
  header{
    padding:0 1rem;
    padding-top:var(--safe-top);
    height:calc(52px + var(--safe-top));
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }
  .logo{font-size:15px}
  .header-right{gap:8px}
  .btn{padding:7px 14px;font-size:13px;border-radius:10px;min-height:38px}

  /* Main */
  .main{padding:1rem 0.9rem calc(2rem + var(--safe-bottom))}
  .page-title{font-size:20px}
  .page-sub{font-size:13px;margin-bottom:1.25rem}

  /* Config card — stacks vertically */
  .config-card{padding:1rem;border-radius:var(--radius-lg)}
  .config-row{flex-direction:column;gap:10px}
  .config-field{min-width:0}
  .config-row .btn{
    width:100%;min-height:48px;
    border-radius:12px;font-size:15px;
  }
  .config-input{font-size:16px;padding:12px 14px;min-height:48px;border-radius:10px}
  .config-status{font-size:13px}

  /* Stats — 2x2 grid */
  .stats-row{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
  .stat-card{padding:0.9rem 1rem;border-radius:12px}
  .stat-value{font-size:24px}
  .stat-label{font-size:10px}

  /* Timeline */
  .timeline-card{padding:1rem;border-radius:var(--radius-lg);margin-bottom:1.5rem}
  .section-title{font-size:14px}
  .timeline-wrap{height:90px}

  /* Charts — single column */
  .questions-grid{grid-template-columns:1fr;gap:10px;margin-bottom:1.5rem}
  .q-analytics-card{padding:1.1rem;border-radius:var(--radius-lg)}
  .qa-title{font-size:14px}
  .chart-wrap{flex-direction:row;gap:1rem;align-items:center}

  /* Text answers */
  .text-answers{max-height:160px}
  .text-answer{font-size:13px}

  /* Table — horizontal scroll with nice styling */
  .table-section{margin-top:1.5rem}
  .resp-table-wrap{border-radius:var(--radius-lg)}
  .resp-table th{padding:9px 12px;font-size:11px}
  .resp-table td{padding:9px 12px;font-size:12px}

  /* Export */
  .export-row{flex-direction:column;gap:8px}
  .export-row .btn{
    width:100%;text-align:center;
    min-height:48px;border-radius:12px;font-size:15px;
  }

  /* Empty/loading */
  .empty-state{padding:3rem 1rem}
  .empty-state h2{font-size:18px}
}

/* ── Very small ──────────────────────────────────────────── */
@media(max-width:390px){
  .main{padding-left:0.75rem;padding-right:0.75rem}
  .stats-row{grid-template-columns:1fr 1fr}
  .stat-value{font-size:20px}
  .page-title{font-size:18px}
  .config-input{font-size:15px}
  .chart-wrap{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div>FormDrop Analytics</div>
  <div class="header-right">
    <button class="btn" onclick="window.location.href='builder.html'">← Builder</button>
    <button class="btn" id="export-pdf-btn" onclick="exportPDF()" style="display:none">Export PDF</button>
    <button class="btn btn-primary" id="export-btn" onclick="exportXLSX()" style="display:none">Export XLSX</button>
  </div>
</header>

<div class="main">
  <div class="page-title">Analytics</div>
  <div class="page-sub">Live response data pulled from your database.</div>

  <div class="config-card">
    <div class="config-row" id="server-row">
      <div class="config-field">
        <label class="config-label">Server URL</label>
        <input class="config-input" id="server-url" type="url" placeholder="https://my-formdrop.vercel.app/api" oninput="saveServerUrl()"/>
      </div>
      <button class="btn btn-primary" onclick="connectAndLoadForms()">Connect</button>
    </div>
    <div id="form-picker-row" style="display:none;margin-top:1rem;">
      <label class="config-label">Select form</label>
      <select class="config-input" id="form-picker" onchange="onFormPicked(this.value)" style="cursor:pointer;">
        <option value="">— Choose a form —</option>
      </select>
    </div>
    <div class="config-status" id="config-status">Connecting to server…</div>
  </div>

  <div id="analytics-body"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>
const COLORS=['#2a5c45','#4a9e7d','#f59e0b','#3b82f6','#ec4899','#8b5cf6','#ef4444','#14b8a6','#f97316','#6366f1'];

function saveServerUrl() {
  localStorage.setItem('fd_server_url', document.getElementById('server-url').value.trim());
}

let _analyticsServerUrl = '';
let currentData = null;
let chartInstances = [];

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.addEventListener('DOMContentLoaded', async () => {
  const status = document.getElementById('config-status');

  // Auto-detect server URL
  let serverUrl = '';
  try {
    const r = await fetch('/api/config', { signal: AbortSignal.timeout(4000) });
    const j = await r.json();
    if (j.ok && j.serverUrl) serverUrl = j.serverUrl.trim().replace(/\/$/, '');
  } catch(e) {}
  if (!serverUrl) serverUrl = localStorage.getItem('fd_server_url') || '';

  if (serverUrl) {
    document.getElementById('server-url').value = serverUrl;
    _analyticsServerUrl = serverUrl;
    await loadFormsDropdown(serverUrl);

    // Auto-select the form that's currently active in builder
    const activeId = localStorage.getItem('fd_form_uuid') || '';
    const picker = document.getElementById('form-picker');
    if (activeId && picker) {
      // Find option matching activeId
      const opt = Array.from(picker.options).find(o => o.value === activeId);
      if (opt) {
        picker.value = activeId;
        loadAnalytics(activeId);
      }
    }
  } else {
    status.className = 'config-status err';
    status.textContent = 'Could not auto-detect server. Enter your server URL and click Connect.';
    document.getElementById('server-row').style.display = 'flex';
  }
});

async function connectAndLoadForms() {
  const serverUrl = document.getElementById('server-url').value.trim().replace(/\/$/, '');
  if (!serverUrl) return;
  localStorage.setItem('fd_server_url', serverUrl);
  _analyticsServerUrl = serverUrl;
  await loadFormsDropdown(serverUrl);
}

async function loadFormsDropdown(serverUrl) {
  const status = document.getElementById('config-status');
  const pickerRow = document.getElementById('form-picker-row');
  const picker = document.getElementById('form-picker');
  status.className = 'config-status';
  status.textContent = 'Loading forms…';
  try {
    const r = await fetch(serverUrl + '/formslist', { signal: AbortSignal.timeout(8000) });
    const text = await r.text();
    let j;
    try { j = JSON.parse(text); } catch(e) { throw new Error('Server error (HTTP ' + r.status + ')'); }
    if (!j.ok) throw new Error(j.error || 'Could not load forms');

    const forms = j.forms;
    if (!forms.length) {
      status.className = 'config-status';
      status.textContent = 'No forms found. Build and save a form first.';
      return;
    }

    // Populate dropdown
    picker.innerHTML = '<option value="">— Choose a form —</option>' +
      forms.map(f => `<option value="${esc(f.id)}">${esc(f.title || 'Untitled')} (${f.response_count} response${f.response_count!==1?'s':''})</option>`).join('');
    pickerRow.style.display = 'block';
    status.className = 'config-status ok';
    status.textContent = `✓ Connected — ${forms.length} form${forms.length!==1?'s':''} found`;
  } catch(e) {
    status.className = 'config-status err';
    status.textContent = '✗ ' + e.message;
  }
}

function onFormPicked(formId) {
  if (!formId) return;
  loadAnalytics(formId);
}

async function loadAnalytics(formId) {
  const serverUrl = _analyticsServerUrl || document.getElementById('server-url').value.trim().replace(/\/$/,'');
  if (!serverUrl || !formId) return;

  const status = document.getElementById('config-status');
  const body   = document.getElementById('analytics-body');

  status.className = 'config-status';
  status.textContent = 'Loading responses…';
  body.innerHTML = '<div class="loading-msg">Fetching data…</div>';
  document.getElementById('export-btn').style.display = 'none';

  try {
    const r = await fetch(`${serverUrl}/analytics/${encodeURIComponent(formId)}`, {
      signal: AbortSignal.timeout(12000),
    });
    const text = await r.text();
    let data;
    try { data = JSON.parse(text); } catch(e) { throw new Error('Server error (HTTP ' + r.status + ')'); }
    if (!data.ok) throw new Error(data.error || 'Server error');

    currentData = data;
    status.className = 'config-status ok';
    status.textContent = `✓ ${data.total} response${data.total===1?'':'s'} for "${data.form.title}"`;
    renderAnalytics(data);
    if (data.total > 0) {
      document.getElementById('export-btn').style.display = '';
      document.getElementById('export-pdf-btn').style.display = '';
    }
  } catch(e) {
    status.className = 'config-status err';
    status.textContent = '✗ ' + e.message;
    body.innerHTML = `<div class="empty-state"><h2>Could not load data</h2><p>${esc(e.message)}</p></div>`;
  }
}

function renderAnalytics(data) {
  chartInstances.forEach(c => { try { c.destroy(); } catch(e){} });
  chartInstances = [];

  const { form, submissions, total } = data;

  if (!total) {
    document.getElementById('analytics-body').innerHTML =
      `<div class="empty-state"><h2>No responses yet</h2><p>Share your form link and responses will appear here.</p></div>`;
    return;
  }

  const first = new Date(submissions[0].submittedAt).toLocaleDateString();
  const last  = new Date(submissions[total-1].submittedAt).toLocaleDateString();
  const answered = q => submissions.filter(s => {
    const v = s.answers?.[q.id];
    return Array.isArray(v) ? v.length > 0 : !!v;
  }).length;

  document.getElementById('analytics-body').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total responses</div><div class="stat-value">${total}</div></div>
      <div class="stat-card"><div class="stat-label">Questions</div><div class="stat-value">${form.questions.length}</div></div>
      <div class="stat-card"><div class="stat-label">First response</div><div class="stat-value" style="font-size:17px">${first}</div></div>
      <div class="stat-card"><div class="stat-label">Latest response</div><div class="stat-value" style="font-size:17px">${last}</div></div>
    </div>
    <div class="timeline-card">
      <div class="section-title">Submissions over time</div>
      <div class="timeline-wrap"><canvas id="timeline-canvas"></canvas></div>
    </div>
    <div class="questions-grid" id="q-grid"></div>
    <div class="table-section" id="adv-section">
      <div class="section-title">Advanced Analysis</div>
      <div class="adv-tabs">
        <button class="adv-tab-btn active" data-adv="desc" onclick="switchAdvTab('desc')">Descriptives</button>
        <button class="adv-tab-btn" data-adv="crosstab" onclick="switchAdvTab('crosstab')">Crosstab</button>
        <button class="adv-tab-btn" data-adv="corr" onclick="switchAdvTab('corr')">Correlation</button>
        <button class="adv-tab-btn" data-adv="segment" onclick="switchAdvTab('segment')">Segment</button>
      </div>
      <div class="adv-panel active" id="adv-desc"></div>
      <div class="adv-panel" id="adv-crosstab"></div>
      <div class="adv-panel" id="adv-corr"></div>
      <div class="adv-panel" id="adv-segment"></div>
    </div>
    <div class="table-section">
      <div class="section-title">All responses</div>
      <div class="resp-table-wrap"><table class="resp-table" id="resp-table"></table></div>
      <div class="export-row">
        <button class="btn" onclick="exportXLSX()">Export all as XLSX</button>
      </div>
    </div>`;

  renderTimeline(submissions);
  renderCharts(form, submissions, answered);
  renderTable(form, submissions);
  renderAdvancedAnalysis(data);
}

/* ── Timeline chart ────────────────────────────────────────────────────────── */
function renderTimeline(submissions) {
  // Bucket by date
  const counts = {};
  submissions.forEach(s => {
    const d = new Date(s.submittedAt).toLocaleDateString('en-CA'); // YYYY-MM-DD
    counts[d] = (counts[d] || 0) + 1;
  });
  const labels = Object.keys(counts).sort();
  const values = labels.map(l => counts[l]);

  const ctx = document.getElementById('timeline-canvas').getContext('2d');
  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: 'rgba(42,92,69,0.15)',
        borderColor: '#2a5c45',
        borderWidth: 1.5,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { title: t => t[0].label, label: t => `${t.parsed.y} submission${t.parsed.y===1?'':'s'}` }}},
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#a8a49e' }},
        y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 }, color: '#a8a49e' }, grid: { color: '#f0ede6' }},
      }
    }
  });
  chartInstances.push(chart);
}

/* ── Per-question charts ───────────────────────────────────────────────────── */
function renderCharts(form, submissions, answered) {
  const grid = document.getElementById('q-grid');
  form.questions.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'q-analytics-card';
    const typeLabel = {short:'Short answer',long:'Paragraph',radio:'Multiple choice',checkbox:'Checkboxes',dropdown:'Dropdown',email:'Email',number:'Number',date:'Date'}[q.type] || q.type;
    const ans = answered(q);
    div.innerHTML = `<div class="qa-title">${esc(q.label||`Question ${qi+1}`)}</div>
      <div class="qa-meta">${typeLabel} · ${ans}/${submissions.length} answered</div>
      <div id="chart-area-${q.id}"></div>`;
    grid.appendChild(div);

    const area = document.getElementById('chart-area-' + q.id);

    if (['radio','checkbox','dropdown'].includes(q.type)) {
      const tally = {};
      submissions.forEach(s => {
        const v = s.answers?.[q.id];
        const vals = Array.isArray(v) ? v : (v ? [v] : []);
        vals.forEach(val => { if(val) tally[val] = (tally[val]||0)+1; });
      });
      const labels = Object.keys(tally);
      const values = Object.values(tally);
      const total = values.reduce((a,b)=>a+b,0)||1;
      if (!labels.length) { area.innerHTML = `<div class="no-answers">No answers yet.</div>`; return; }

      const canvasId = 'cv-' + q.id;
      area.innerHTML = `<div class="chart-wrap">
        <canvas id="${canvasId}" width="150" height="150" style="flex-shrink:0"></canvas>
        <div class="legend" id="leg-${q.id}"></div>
      </div>`;
      const ctx = document.getElementById(canvasId).getContext('2d');
      const chart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data: values, backgroundColor: COLORS.slice(0,labels.length), borderWidth: 2, borderColor: '#fff' }]},
        options: { responsive: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.label}: ${c.parsed} (${Math.round(c.parsed/total*100)}%)` }}}, cutout: '62%' }
      });
      chartInstances.push(chart);

      const leg = document.getElementById('leg-' + q.id);
      labels.forEach((lbl, i) => {
        const pct = Math.round(values[i]/total*100);
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div>
          <span class="legend-label">${esc(lbl)}</span>
          <span class="legend-pct">${pct}%</span>`;
        leg.appendChild(item);
      });
    } else {
      const answers = submissions.map(s => {
        const v = s.answers?.[q.id];
        return Array.isArray(v) ? v.join(', ') : (v||'');
      }).filter(Boolean);
      if (!answers.length) { area.innerHTML = `<div class="no-answers">No answers yet.</div>`; return; }
      area.innerHTML = `<div class="text-answers">${answers.slice().reverse().map(a => `<div class="text-answer">${esc(a)}</div>`).join('')}</div>`;
    }
  });
}

/* ════════════════════════════════════════════════════════════════════════════
   ADVANCED ANALYSIS — descriptives, crosstab, correlation, segment/filter.
   All computed client-side from the same submissions data already loaded.
   ════════════════════════════════════════════════════════════════════════════ */

// Recognized ordinal/Likert-style option wordings, mapped to a 1-5 (or 1-3)
// numeric code. A radio/dropdown question is treated as numeric/scale ONLY if
// every one of its options matches this dictionary — anything else (Farmer /
// Fisher / Other, etc.) is left as categorical, not coerced into a scale.
const LIKERT_WORD_VALUES = {
  'strongly disagree':1,'disagree':2,'neutral':3,'neither agree nor disagree':3,'undecided':3,'agree':4,'strongly agree':5,
  'very poor':1,'poor':2,'fair':3,'good':4,'excellent':5,
  'never':1,'rarely':2,'sometimes':3,'often':4,'always':5,
  'not at all likely':1,'not very likely':2,'somewhat likely':3,'very likely':4,'extremely likely':5,
  'no':1,'not sure':2,'yes':3,
};
function normWord(s) { return String(s || '').toLowerCase().trim(); }

// Returns a function that converts one raw answer into a number, or null if
// this question isn't numeric/ordinal — used to gate descriptives/correlation
// to only the questions where a mean/std-dev actually makes sense.
function getNumericCoder(q) {
  if (q.type === 'number') {
    return v => { const n = parseFloat(v); return isNaN(n) ? null : n; };
  }
  if ((q.type === 'radio' || q.type === 'dropdown') && Array.isArray(q.options) && q.options.length >= 2) {
    const allKnown = q.options.every(o => LIKERT_WORD_VALUES[normWord(o)] !== undefined);
    if (allKnown) {
      return v => { const val = LIKERT_WORD_VALUES[normWord(Array.isArray(v) ? v[0] : v)]; return val === undefined ? null : val; };
    }
  }
  return null;
}
function isCategorical(q) {
  return (q.type === 'radio' || q.type === 'dropdown') && Array.isArray(q.options) && q.options.length > 0;
}

/* ── Descriptives ─────────────────────────────────────────────────────────── */
function computeDescriptives(q, submissions, coder) {
  const values = [];
  submissions.forEach(s => {
    const raw = s.answers?.[q.id];
    if (raw === undefined || raw === null || raw === '') return;
    const n = coder(raw);
    if (n !== null && !isNaN(n)) values.push(n);
  });
  if (!values.length) return null;
  const n = values.length;
  const mean = values.reduce((a, b) => a + b, 0) / n;
  const sorted = [...values].sort((a, b) => a - b);
  const median = n % 2 ? sorted[(n - 1) / 2] : (sorted[n / 2 - 1] + sorted[n / 2]) / 2;
  const freq = {};
  values.forEach(v => { freq[v] = (freq[v] || 0) + 1; });
  const mode = Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];
  const variance = n > 1 ? values.reduce((a, b) => a + (b - mean) ** 2, 0) / (n - 1) : 0;
  return { n, mean, median, mode: Number(mode), std: Math.sqrt(variance), min: sorted[0], max: sorted[n - 1] };
}

function renderDescriptives(form, submissions) {
  const el = document.getElementById('adv-desc');
  const rows = form.questions
    .filter(q => q.type !== 'section')
    .map(q => ({ q, coder: getNumericCoder(q) }))
    .filter(x => x.coder)
    .map(({ q, coder }) => ({ q, stats: computeDescriptives(q, submissions, coder) }))
    .filter(x => x.stats);

  if (!rows.length) {
    el.innerHTML = `<div class="adv-empty">No Likert-scale, agree/disagree, or number questions found. This works automatically for radio/dropdown questions whose options are a recognized scale (e.g. Strongly Disagree…Strongly Agree, Poor…Excellent, Never…Always, Yes/Not sure/No) and for Number-type questions.</div>`;
    return;
  }
  el.innerHTML = `
    <p class="adv-hint">Mean, median, mode, and standard deviation for every auto-detected Likert-scale and number question. Scale questions are coded 1 (lowest) through 5 (highest).</p>
    <div class="resp-table-wrap"><table class="adv-table">
      <thead><tr><th>Question</th><th>N</th><th>Mean</th><th>Median</th><th>Mode</th><th>Std Dev</th><th>Min</th><th>Max</th></tr></thead>
      <tbody>${rows.map(({ q, stats }) => `
        <tr>
          <td>${esc(q.label || '')}</td>
          <td>${stats.n}</td>
          <td>${stats.mean.toFixed(2)}</td>
          <td>${stats.median.toFixed(2)}</td>
          <td>${stats.mode}</td>
          <td>${stats.std.toFixed(2)}</td>
          <td>${stats.min}</td>
          <td>${stats.max}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
}

/* ── Crosstab ─────────────────────────────────────────────────────────────── */
function computeCrosstab(qRow, qCol, submissions) {
  const rowOpts = qRow.options || [];
  const colOpts = qCol.options || [];
  const table = rowOpts.map(() => colOpts.map(() => 0));
  submissions.forEach(s => {
    const rv = s.answers?.[qRow.id], cv = s.answers?.[qCol.id];
    const rvals = Array.isArray(rv) ? rv : (rv ? [rv] : []);
    const cvals = Array.isArray(cv) ? cv : (cv ? [cv] : []);
    rvals.forEach(rvv => {
      const ri = rowOpts.indexOf(rvv);
      if (ri < 0) return;
      cvals.forEach(cvv => { const ci = colOpts.indexOf(cvv); if (ci >= 0) table[ri][ci]++; });
    });
  });
  return { rowOpts, colOpts, table };
}

function renderCrosstabControls(form) {
  const el = document.getElementById('adv-crosstab');
  const catQs = form.questions.filter(isCategorical);
  if (catQs.length < 2) {
    el.innerHTML = `<div class="adv-empty">Need at least two multiple-choice or dropdown questions to cross-tabulate.</div>`;
    return;
  }
  const opts = catQs.map(q => `<option value="${esc(q.id)}">${esc(q.label || '')}</option>`).join('');
  el.innerHTML = `
    <div class="adv-controls">
      <div><label class="config-label" style="display:block;margin-bottom:5px;">Rows</label><select class="adv-select" id="crosstab-row" onchange="updateCrosstab()">${opts}</select></div>
      <div><label class="config-label" style="display:block;margin-bottom:5px;">Columns</label><select class="adv-select" id="crosstab-col" onchange="updateCrosstab()">${opts}</select></div>
      <div><label class="config-label" style="display:block;margin-bottom:5px;">Show</label><select class="adv-select" id="crosstab-mode" onchange="updateCrosstab()">
        <option value="count">Counts</option>
        <option value="row">Row %</option>
        <option value="col">Column %</option>
      </select></div>
    </div>
    <div id="crosstab-result"></div>`;
  if (catQs.length > 1) document.getElementById('crosstab-col').selectedIndex = 1;
  updateCrosstab();
}

function updateCrosstab() {
  const { form, submissions } = currentData;
  const rowSel = document.getElementById('crosstab-row'), colSel = document.getElementById('crosstab-col');
  if (!rowSel || !colSel) return;
  const qRow = form.questions.find(q => q.id === rowSel.value);
  const qCol = form.questions.find(q => q.id === colSel.value);
  const mode = document.getElementById('crosstab-mode').value;
  const result = document.getElementById('crosstab-result');
  if (!qRow || !qCol) { result.innerHTML = ''; return; }
  if (qRow.id === qCol.id) { result.innerHTML = `<div class="adv-empty">Choose two different questions.</div>`; return; }

  const { rowOpts, colOpts, table } = computeCrosstab(qRow, qCol, submissions);
  const rowTotals = table.map(r => r.reduce((a, b) => a + b, 0));
  const colTotals = colOpts.map((_, ci) => table.reduce((a, r) => a + r[ci], 0));
  const grandTotal = rowTotals.reduce((a, b) => a + b, 0);

  function cell(ri, ci) {
    const v = table[ri][ci];
    if (mode === 'row') return rowTotals[ri] ? (v / rowTotals[ri] * 100).toFixed(1) + '%' : '0%';
    if (mode === 'col') return colTotals[ci] ? (v / colTotals[ci] * 100).toFixed(1) + '%' : '0%';
    return String(v);
  }

  result.innerHTML = `<div class="resp-table-wrap"><table class="adv-table">
    <thead><tr><th>${esc(qRow.label)} vs ${esc(qCol.label)}</th>${colOpts.map(c => `<th>${esc(c)}</th>`).join('')}<th>Total</th></tr></thead>
    <tbody>
      ${rowOpts.map((r, ri) => `<tr><td>${esc(r)}</td>${colOpts.map((c, ci) => `<td>${cell(ri, ci)}</td>`).join('')}<td><strong>${rowTotals[ri]}</strong></td></tr>`).join('')}
      <tr><td><strong>Total</strong></td>${colOpts.map((c, ci) => `<td><strong>${colTotals[ci]}</strong></td>`).join('')}<td><strong>${grandTotal}</strong></td></tr>
    </tbody>
  </table></div>`;
}

/* ── Correlation matrix ───────────────────────────────────────────────────── */
function pearsonCorr(x, y) {
  const n = x.length;
  const mx = x.reduce((a, b) => a + b, 0) / n, my = y.reduce((a, b) => a + b, 0) / n;
  let num = 0, dx = 0, dy = 0;
  for (let i = 0; i < n; i++) { num += (x[i] - mx) * (y[i] - my); dx += (x[i] - mx) ** 2; dy += (y[i] - my) ** 2; }
  const denom = Math.sqrt(dx * dy);
  return denom === 0 ? 0 : num / denom;
}
function corrColor(v) {
  const a = Math.min(1, Math.abs(v));
  return v >= 0 ? `rgba(42,92,69,${(a * 0.65).toFixed(2)})` : `rgba(192,57,43,${(a * 0.65).toFixed(2)})`;
}

function renderCorrelationMatrix(form, submissions) {
  const el = document.getElementById('adv-corr');
  const codeable = form.questions
    .filter(q => q.type !== 'section')
    .map(q => ({ q, coder: getNumericCoder(q) }))
    .filter(x => x.coder);

  if (codeable.length < 2) {
    el.innerHTML = `<div class="adv-empty">Need at least two Likert-scale or number questions to compute correlations.</div>`;
    return;
  }

  const n = codeable.length;
  const matrix = [];
  for (let i = 0; i < n; i++) {
    matrix.push([]);
    for (let j = 0; j < n; j++) {
      if (i === j) { matrix[i].push(1); continue; }
      const xs = [], ys = [];
      submissions.forEach(s => {
        const rawX = s.answers?.[codeable[i].q.id], rawY = s.answers?.[codeable[j].q.id];
        if (rawX === undefined || rawX === null || rawX === '' || rawY === undefined || rawY === null || rawY === '') return;
        const vx = codeable[i].coder(rawX), vy = codeable[j].coder(rawY);
        if (vx !== null && vy !== null && !isNaN(vx) && !isNaN(vy)) { xs.push(vx); ys.push(vy); }
      });
      matrix[i].push(xs.length >= 3 ? pearsonCorr(xs, ys) : null);
    }
  }

  el.innerHTML = `
    <p class="adv-hint">Pearson correlation between every pair of Likert-scale/number questions (needs ≥3 shared answers). +1 = move perfectly together, −1 = move perfectly opposite, 0 = unrelated. Hover a row/column for the full question text.</p>
    <div class="resp-table-wrap"><table class="adv-table" style="font-size:11.5px">
      <thead><tr><th></th>${codeable.map((c, i) => `<th title="${esc(c.q.label)}">Q${i + 1}</th>`).join('')}</tr></thead>
      <tbody>
        ${codeable.map((c, i) => `<tr><td title="${esc(c.q.label)}" style="white-space:nowrap;max-width:240px;overflow:hidden;text-overflow:ellipsis;">Q${i + 1}. ${esc(c.q.label)}</td>${matrix[i].map(v => v === null ? '<td style="color:var(--text3)">—</td>' : `<td style="background:${corrColor(v)}">${v.toFixed(2)}</td>`).join('')}</tr>`).join('')}
      </tbody>
    </table></div>`;
}

      <div><label class="config-label" style="display:block;margin-bottom:5px;">Equal to</label><select class="adv-select" id="segment-val" onchange="updateSegment()"></select></div>
    </div>

function updateSegmentValueOptions() {
  const { form } = currentData;
  const q = form.questions.find(qq => qq.id === document.getElementById('segment-q').value);
  const valSel = document.getElementById('segment-val');
  valSel.innerHTML = (q.options || []).map(o => `<option value="${esc(o)}">${esc(o)}</option>`).join('');
  updateSegment();
}

function updateSegment() {
  const { form, submissions } = currentData;
  const qId = document.getElementById('segment-q').value;
  const val = document.getElementById('segment-val').value;
  const q = form.questions.find(qq => qq.id === qId);
  const result = document.getElementById('segment-result');
  if (!q || !val) { result.innerHTML = ''; return; }

  const segment = submissions.filter(s => {
    const v = s.answers?.[q.id];
    return Array.isArray(v) ? v.includes(val) : v === val;
  });

  if (!segment.length) {
    result.innerHTML = `<div class="adv-empty">No responses where "${esc(q.label)}" = "${esc(val)}".</div>`;
    return;
  }

  const otherQs = form.questions.filter(qq => qq.type !== 'section' && qq.id !== q.id && (isCategorical(qq) || qq.type === 'checkbox'));
  const cards = otherQs.map(oq => {
    const tally = {};
    segment.forEach(s => {
      const v = s.answers?.[oq.id];
      const vals = Array.isArray(v) ? v : (v ? [v] : []);
      vals.forEach(vv => { if (vv) tally[vv] = (tally[vv] || 0) + 1; });
    });
    const entries = Object.entries(tally).sort((a, b) => b[1] - a[1]);
    if (!entries.length) return '';
    const totalAns = entries.reduce((a, [, c]) => a + c, 0);
    return `<div class="q-analytics-card">
      <div class="qa-title">${esc(oq.label || '')}</div>
      <div class="qa-meta">${segment.length} in segment</div>
      <div class="legend">${entries.map(([k, c]) => `<div class="legend-item"><span class="legend-label">${esc(k)}</span><span class="legend-pct">${c} (${Math.round(c / totalAns * 100)}%)</span></div>`).join('')}</div>
    </div>`;
  }).filter(Boolean);

  result.innerHTML = `
    <p class="adv-hint"><strong>${segment.length}</strong> of ${submissions.length} responses have "${esc(q.label)}" = "${esc(val)}" (${Math.round(segment.length / submissions.length * 100)}%). Breakdown of other questions within this segment:</p>
    <div class="questions-grid">${cards.join('') || '<div class="adv-empty">No other multiple-choice/checkbox questions to break down.</div>'}</div>`;
}

/* ── Export ────────────────────────────────────────────────────────────────────
   Column layout is built to import cleanly into SPSS:
   - Each checkbox (multi-select) question becomes one 0/1 column PER OPTION
     (SPSS has no native way to read a single "A, B, C" cell as a multi-response
     set — separate dichotomy columns is the standard layout it expects), plus an
     "Other" flag column and an "Other (specify)" text column when applicable.
   - Number questions are written as real numbers, not text, so SPSS auto-detects
     them as a numeric/scale variable instead of a string.
   - Radio/dropdown/text questions stay a single column — SPSS imports those as
     categorical/string variables directly, no transform needed.
   ──────────────────────────────────────────────────────────────────────────── */
function buildExportColumns(questions) {
  const cols = [];
  questions.forEach((q, i) => {
    if (q.type === 'section') return;
    const label = q.label || `Question ${i+1}`;

    if (q.type === 'checkbox') {
      (q.options || []).forEach(opt => {
        cols.push({ header: `${label} - ${opt}`, get: ans => {
          const v = ans[q.id];
          const vals = Array.isArray(v) ? v : (v ? [v] : []);
          return vals.includes(opt) ? 1 : 0;
        }});
      });
      if (q.allowOther) {
        cols.push({ header: `${label} - Other`, get: ans => {
          const v = ans[q.id];
          const vals = Array.isArray(v) ? v : (v ? [v] : []);
          return vals.some(x => x === 'Other' || (typeof x === 'string' && x.startsWith('Other:'))) ? 1 : 0;
        }});
        cols.push({ header: `${label} - Other (specify)`, get: ans => {
          const v = ans[q.id];
          const vals = Array.isArray(v) ? v : (v ? [v] : []);
          const other = vals.find(x => typeof x === 'string' && x.startsWith('Other:'));
          return other ? other.slice(6).trim() : '';
        }});
      }
    } else if (q.type === 'number') {
      cols.push({ header: label, get: ans => {
        const v = ans[q.id];
        if (v === undefined || v === null || v === '') return '';
        const n = Number(v);
        return isNaN(n) ? v : n;
      }});
    } else {
      cols.push({ header: label, get: ans => {
        const v = ans[q.id];
        return Array.isArray(v) ? v.join(', ') : (v ?? '');
      }});
    }
  });
  return cols;
}

function exportXLSX() {
  if (!currentData) return;
  const { form, submissions } = currentData;
  const cols = buildExportColumns(form.questions);
  const hasRespondents = submissions.some(s => s.respondentName);
  const header = ['Submission #', 'Submitted At', ...(hasRespondents ? ['Respondent'] : []), ...cols.map(c => c.header)];
  const rows = submissions.map((s, idx) => {
    const date = new Date(s.submittedAt).toLocaleString();
    const ans = s.answers || {};
    return [idx+1, date, ...(hasRespondents ? [s.respondentName || ''] : []), ...cols.map(c => c.get(ans))];
  });
  const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
  ws['!cols'] = [{wch:14},{wch:22}, ...(hasRespondents ? [{wch:20}] : []), ...cols.map(()=>({wch:24}))];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Responses');
  XLSX.writeFile(wb, (form.title||'responses').replace(/[^a-z0-9]/gi,'_')+'_responses.xlsx');
}

/* ── PDF export — full analytics report (summary, charts, per-question breakdown) ── */
function exportPDF() {
  if (!currentData || !window.jspdf) return;
  const { form, submissions, total } = currentData;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 44;
  let y = margin;

  function ensureSpace(h) {
    if (y + h > pageH - margin) { doc.addPage(); y = margin; }
  }
  function wrapText(text, maxWidth, size) {
    doc.setFontSize(size);
    return doc.splitTextToSize(String(text || ''), maxWidth);
  }

  // Header
  doc.setFont(undefined, 'bold'); doc.setFontSize(18); doc.setTextColor(26,25,22);
  doc.text(form.title || 'Untitled form', margin, y);
  y += 20;
  doc.setFont(undefined, 'normal'); doc.setFontSize(10); doc.setTextColor(107,103,96);
  doc.text(`Analytics report · ${total} response${total===1?'':'s'} · generated ${new Date().toLocaleString()}`, margin, y);
  y += 10;
  doc.setDrawColor(226,221,212); doc.line(margin, y, pageW - margin, y);
  y += 24;
  doc.setTextColor(26,25,22);

  const answered = q => submissions.filter(s => {
    const v = s.answers?.[q.id];
    return Array.isArray(v) ? v.length > 0 : !!v;
  }).length;

  const typeLabel = {short:'Short answer',long:'Paragraph',radio:'Multiple choice',checkbox:'Checkboxes',dropdown:'Dropdown',email:'Email',number:'Number',date:'Date',file:'File upload'};

  form.questions.forEach((q, qi) => {
    if (q.type === 'section') return;
    ensureSpace(70);

    doc.setFont(undefined, 'bold'); doc.setFontSize(12.5);
    const titleLines = wrapText(q.label || `Question ${qi+1}`, pageW - 2*margin, 12.5);
    doc.text(titleLines, margin, y);
    y += titleLines.length * 15;

    doc.setFont(undefined, 'normal'); doc.setFontSize(9.5); doc.setTextColor(168,164,158);
    doc.text(`${typeLabel[q.type] || q.type} · ${answered(q)}/${submissions.length} answered`, margin, y);
    doc.setTextColor(26,25,22);
    y += 14;

    if (['radio','checkbox','dropdown'].includes(q.type)) {
      const tally = {};
      submissions.forEach(s => {
        const v = s.answers?.[q.id];
        const vals = Array.isArray(v) ? v : (v ? [v] : []);
        vals.forEach(val => { if (val) tally[val] = (tally[val]||0)+1; });
      });
      const labels = Object.keys(tally);
      const totalVals = Object.values(tally).reduce((a,b)=>a+b,0) || 1;
      if (!labels.length) {
        doc.setFontSize(10); doc.setTextColor(168,164,158);
        doc.text('No answers yet.', margin, y);
        doc.setTextColor(26,25,22);
        y += 16;
      } else {
        // Reuse the on-screen doughnut chart canvas as an image if present
        const canvas = document.getElementById('cv-' + q.id);
        ensureSpace(labels.length * 14 + 20);
        let barY = y;
        if (canvas) {
          try {
            const img = canvas.toDataURL('image/png');
            doc.addImage(img, 'PNG', margin, barY, 90, 90);
          } catch(e) {}
        }
        const legX = canvas ? margin + 105 : margin;
        const legW = pageW - margin - legX;
        doc.setFontSize(10);
        labels.forEach((lbl, i) => {
          const pct = Math.round(tally[lbl]/totalVals*100);
          const lines = wrapText(`${lbl} — ${tally[lbl]} (${pct}%)`, legW, 10);
          doc.text(lines, legX, barY + 11);
          barY += lines.length * 12;
        });
        y = Math.max(y + 100, barY + 8);
      }
    } else {
      const answers = submissions.map(s => {
        const v = s.answers?.[q.id];
        return Array.isArray(v) ? v.join(', ') : (v||'');
      }).filter(Boolean);
      if (!answers.length) {
        doc.setFontSize(10); doc.setTextColor(168,164,158);
        doc.text('No answers yet.', margin, y);
        doc.setTextColor(26,25,22);
        y += 16;
      } else {
        const shown = answers.slice(0, 15);
        doc.setFontSize(10);
        shown.forEach(a => {
          const lines = wrapText('• ' + a, pageW - 2*margin, 10);
          ensureSpace(lines.length * 13);
          doc.text(lines, margin, y);
          y += lines.length * 13;
        });
        if (answers.length > shown.length) {
          doc.setTextColor(168,164,158);
          doc.text(`…and ${answers.length - shown.length} more response${answers.length - shown.length===1?'':'s'} (see XLSX export for the full list).`, margin, y);
          doc.setTextColor(26,25,22);
          y += 14;
        }
      }
    }
    y += 16;
  });

  doc.save((form.title||'analytics').replace(/[^a-z0-9]/gi,'_') + '_analytics.pdf');
}
</script>
</body>
</html>
